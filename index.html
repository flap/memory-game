<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória - Gatinhos</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffb6c1; font-family: sans-serif; color: #fff; gap: 20px; }
  .confetti { position: fixed; top: -10px; font-size: 1.2rem; animation: fall 3s linear forwards; pointer-events: none; z-index: 10; }
  @keyframes fall { to { top: 105vh; opacity: 0; } }
  #trophy { display: none; font-size: 4rem; animation: pop 0.5s ease; }
  @keyframes pop { 0% { transform: scale(0); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
  h1 { font-size: 1.8rem; }
  .board { display: grid; grid-template-columns: repeat(4, 90px); gap: 10px; }
  .card { width: 90px; height: 90px; font-size: 2.8rem; background: #d63384; border: 2px solid #c2185b; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
  .card.flipped, .card.matched { background: #c2185b; transform: rotateY(180deg); }
  .card.matched { cursor: default; opacity: 0.6; }
  #info { font-size: 1.2rem; min-height: 1.5em; }
  button { padding: 8px 20px; font-size: 1rem; border: none; border-radius: 8px; background: #e94560; color: #fff; cursor: pointer; }
</style>
</head>
<body>
<h1>🐱 Jogo da Memória</h1>
<p id="info">Movimentos: 0</p>
<div class="board" id="board"></div>
<div id="trophy">🏆</div>
<button onclick="init()">Reiniciar</button>
<script>
const emojis = ['😺','😸','😻','😽','🙀','😿','😹','😾'];
let cards, flipped, matched, locked, moves;

function init() {
  moves = 0; flipped = []; matched = 0; locked = false;
  document.getElementById('info').textContent = 'Movimentos: 0';
  document.getElementById('trophy').style.display = 'none';
  document.querySelectorAll('.confetti').forEach(c => c.remove());
  cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((e, i) => {
    const d = document.createElement('div');
    d.className = 'card';
    d.dataset.idx = i;
    d.addEventListener('click', flip);
    board.appendChild(d);
  });
}

function flip() {
  if (locked || this.classList.contains('flipped') || this.classList.contains('matched')) return;
  this.classList.add('flipped');
  this.textContent = cards[this.dataset.idx];
  flipped.push(this);
  if (flipped.length === 2) {
    locked = true;
    moves++;
    document.getElementById('info').textContent = 'Movimentos: ' + moves;
    if (cards[flipped[0].dataset.idx] === cards[flipped[1].dataset.idx]) {
      flipped.forEach(c => c.classList.add('matched'));
      flipped = []; locked = false; matched += 2;
      if (matched === cards.length) { document.getElementById('info').textContent = `🎉 Parabéns! ${moves} movimentos!`; document.getElementById('trophy').style.display = 'block'; confetti(); }
    } else {
      setTimeout(() => { flipped.forEach(c => { c.classList.remove('flipped'); c.textContent = ''; }); flipped = []; locked = false; }, 800);
    }
  }
}

function confetti() {
  const pieces = ['🎊','🎉','✨','💖','⭐','🌟'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = pieces[Math.random() * pieces.length | 0];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = Math.random() * 1.5 + 's';
    document.body.appendChild(el);
  }
}

init();
</script>
</body>
</html>
